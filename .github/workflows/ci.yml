name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 20 = engines floor, 22 = active LTS, 26 = current. better-sqlite3
        # (prebuilt binaries) and web-tree-sitter (pinned 0.25.x, see
        # CLAUDE.md) are both Node-version-sensitive; the matrix catches a
        # bad pairing before it reaches a release.
        node-version: [20.x, 22.x, 26.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # Non-blocking signal: the POSIX path normalization work (cache keys,
  # import edges, pathPrefix scoping) is asserted in unit tests but has
  # never run on a real Windows filesystem. Failures here don't gate
  # merges; they tell us when the Windows story regresses.
  windows:
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      # better-sqlite3 ships Windows prebuilts, but its install script falls
      # through to a node-gyp source build when the prebuilt download flakes —
      # and the runner has no Visual Studio, so that fallback always fails
      # (#189). Forbid the source build outright (the prebuilt is the only
      # supported path; see CLAUDE.md) and retry the install so a transient
      # download blip gets another attempt instead of dropping to gyp.
      - name: Install dependencies
        shell: pwsh
        env:
          npm_config_build_from_source: 'false'
        run: |
          for ($i = 1; $i -le 3; $i++) {
            npm ci
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "::warning::npm ci failed (attempt $i/3), retrying in 10s"
            Start-Sleep -Seconds 10
          }
          exit 1

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
